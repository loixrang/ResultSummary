<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Results summary component</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="left">
        <div class="result-title">
          <h2>Your Result</h2>
        </div>
        <div class="score">
          <div class="circle">
            <h1>76</h1>
            <p>of 100</p>
          </div>
        </div>
        <div class="great">
          <h1>Great</h1>
        </div>
        <div class="para">
          <p>
            You scored higher than 65% of the people who have taken these tests.
          </p>
        </div>
      </div>
      <div class="right">
        <h2>Summary</h2>
        <div class="reaction">
          <img class="icon" src="assets/images/icon-reaction.svg" alt="lightning" />
          <p class="spacer">Reaction</p>
          <p class="percent"><span>80</span> / <span class="hunnid">100</span></p>
        </div>
        <div class="memory">
          <img class="icon" src="assets/images/icon-memory.svg" alt="performance" />
          <p class="spacer">Memory</p>
          <p class="percent"><span>92</span> / <span class="hunnid">100</span></p>
        </div>
        <div class="verbal">
          <img class="icon" src="assets/images/icon-verbal.svg" alt="message" />
          <p class="spacer">Verbal</p>
          <p class="percent"><span>61</span> / <span class="hunnid">100</span></p>
        </div>
        <div class="visual">
          <img class="icon" src="assets/images/icon-visual.svg" alt="eye" />
          <p class="spacer">Visual</p>
          <p class="percent"><span>73</span> / <span class="hunnid">100</span></p>
        </div>
        <button>Continue</button>
      </div>
    </div>
  </body>
</html>
